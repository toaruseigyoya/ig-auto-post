name: 下書き生成（手動）

on:
  workflow_dispatch:
    inputs:
      idea_id:
        description: 'アイデアID（空白の場合は全未処理を生成）'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install Pillow

      - name: 下書き生成
        run: |
          if [ -n "${{ github.event.inputs.idea_id }}" ]; then
            python scripts/generate_content.py --id "${{ github.event.inputs.idea_id }}"
          else
            python scripts/generate_content.py
          fi

      - name: 変更をコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "generate: $(date +'%Y-%m-%d')"
          git push
